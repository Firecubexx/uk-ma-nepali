services:
  - type: web
    name: uk-ma-nepali-3
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
  - type: static
    name: uk-ma-nepali-1
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://uk-ma-nepali-3.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
